name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write
  issues: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libsndfile1 \
            portaudio19-dev \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage (JUnit XML)
        env:
          SARVIS_SKIP_CV2_PRELOAD: "1"
        run: |
          mkdir -p test-results
          coverage run -m xmlrunner discover -s tests -o test-results -v
          coverage report
          coverage xml

      # 사이클 #8: tests/test_server_endpoints.py 추가 — server.py 커버리지를
      # 14.7% → 56.5% 로 끌어올려 전체 라인/브랜치 커버 62.4% 달성. 임계값을
      # 50 → 60 으로 상향. 다음 사이클은 70% 목표 (streaming 백엔드 분기 + voice
      # synthesize() 파이프라인 보강).
      - name: Enforce coverage threshold
        run: |
          coverage report --fail-under=60

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: test-results/**/*.xml
          if-no-files-found: warn
          retention-days: 7

      - name: Publish test results to PR
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/**/*.xml
          check_name: "Unit test results"
          comment_mode: failures
          comment_title: "Unit test results"
          report_individual_runs: true
          action_fail: false
          job_summary: true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            .coverage
          if-no-files-found: warn
          retention-days: 14
