<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03070C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>S.A.R.V.I.S</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ======================== Main ======================== -->
<section id="main-screen" class="screen">
  <header class="topbar">
    <div class="brand-sm">S . A . R . V . I . S</div>
    <div id="state-pill" class="state-pill">STATE · IDLE</div>

    <!-- 패널 토글 (대화 우선, 나머지는 원하면 표시) -->
    <div class="panel-toggles" role="group" aria-label="패널 표시">
      <button id="toggle-orb" class="panel-toggle ghost" type="button"
              aria-pressed="false" title="오브 패널 (1)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <circle cx="12" cy="12" r="9" opacity="0.4"/>
        </svg>
        <span>오브</span>
      </button>
      <button id="toggle-vision" class="panel-toggle ghost" type="button"
              aria-pressed="false" title="비전 (카메라/얼굴) 패널 (2)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>비전</span>
      </button>
      <button id="toggle-mode" class="panel-toggle ghost" type="button"
              aria-pressed="false" title="모드 / 백엔드 (3)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <span>모드</span>
      </button>
    </div>

    <div class="meta">
      <span id="clock"></span>
      <span class="dot">·</span>
      <span>BRAIN <strong id="backend-label">CLAUDE</strong></span>
      <button id="continuous-toggle" class="continuous-toggle ghost" type="button"
              aria-pressed="false" title="연속 대화 모드 — 응답 후 자동으로 다음 발화를 듣습니다 (30초 무음 시 자동 종료)">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <polyline points="21 4 21 10 15 10"/>
        </svg>
        <span>연속</span>
      </button>
      <a id="control-panel-btn" class="control-panel-btn" href="/harness/dashboard.html"
         target="_blank" rel="noopener" title="Harness 진행 대시보드 (새 탭)">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        <span>제어판</span>
      </a>
    </div>
  </header>

  <main class="layout">
    <!-- 좌/탭1: 오브 패널 (toggle, 기본 숨김) -->
    <div class="orb-pane">
      <div class="orb-stack">
        <div class="orb-unit primary">
          <span class="orb-tag">CLAUDE</span>
          <canvas id="orb" width="640" height="640"></canvas>
          <span class="orb-sub-emotion" id="emotion-label-1">NEUTRAL</span>
        </div>
        <div class="orb-unit secondary" hidden>
          <span class="orb-tag">OPENAI</span>
          <canvas id="orb-2" width="640" height="640"></canvas>
          <span class="orb-sub-emotion" id="emotion-label-2">NEUTRAL</span>
        </div>
      </div>
      <div class="orb-label">
        <span id="emotion-label">NEUTRAL</span>
        <span id="hint-label" class="hint">SPACE 또는 마이크 버튼으로 말하세요</span>
      </div>
      <div id="tool-badge" class="tool-badge hidden">⚙ <span id="tool-name"></span></div>

      <div class="orb-style-picker" role="radiogroup" aria-label="오브 스타일">
        <span class="picker-label">ORB STYLE</span>
        <button data-orb-style="orbital" class="ghost active" title="토성형 궤도">ORBITAL</button>
        <button data-orb-style="pulse"   class="ghost" title="레이더 파동">PULSE</button>
        <button data-orb-style="reactor" class="ghost" title="아크 리액터">REACTOR</button>
        <button data-orb-style="neural"  class="ghost" title="뉴럴넷">NEURAL</button>
      </div>

      <!-- 모바일 전용: ORB 탭에서 사비스 응답 표시 -->
      <div id="orb-reply" class="orb-reply" role="status" aria-live="assertive" aria-label="사비스 응답"></div>
    </div>

    <!-- 가운데: 대화 메인 (기본) -->
    <div class="chat-main">
      <div class="log-pane">
        <div class="log-header">
          <span>SARVIS · 대화</span>
          <span class="log-sub">한국어로 대화하거나 SPACE 로 음성 입력</span>
        </div>
        <div id="log" class="log-body" role="log" aria-live="polite"></div>
      </div>

      <!-- 모드 패널 (토글, chat-main 위에 떠 있음) -->
      <div id="mode-panel" class="mode-panel" hidden>
        <div class="mode-section">
          <div class="mode-title">백엔드 선택</div>
          <div class="quick-keys">
            <button data-key="claude" class="ghost">1·CLAUDE</button>
            <button data-key="openai" class="ghost">2·OPENAI</button>
            <button data-key="ollama" class="ghost">3·OLLAMA</button>
            <button data-key="zhipuai" class="ghost">4·GLM</button>
            <button data-key="gemini" class="ghost">5·GEMINI</button>
            <button data-key="compare" class="ghost">6·COMPARE</button>
            <button data-key="reset" class="ghost">R·RESET</button>
          </div>
        </div>
        <div class="mode-section" id="model-select-section">
          <div class="mode-title">모델 선택 <span id="model-backend-label" class="muted">—</span></div>
          <select id="model-select" class="model-select" aria-label="모델 선택">
            <option value="">(불러오는 중...)</option>
          </select>
          <div class="model-hint muted">선택 즉시 적용. compare 는 변경 불가.</div>
        </div>
      </div>

      <!-- 데스크톱 통합 입력바 (마이크 + 텍스트 + 전송) -->
      <form id="text-form" class="text-input">
        <button id="mic-btn" type="button" class="mic-inline" aria-label="음성 입력">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3z"/>
            <path d="M19 10a7 7 0 01-14 0"/>
            <line x1="12" y1="17" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
          <span id="mic-label" class="mic-label-sr">SPEAK</span>
        </button>
        <input id="text-input" type="text" placeholder="SARVIS에게 한국어로 물어보세요..."
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button type="submit" class="send-btn">SEND</button>
      </form>

      <!-- (구) 컨트롤 영역 placeholder — app.js 호환을 위해 hidden으로 유지 -->
      <div class="controls" hidden></div>
    </div>

    <!-- 우/탭2: 비전 패널 (카메라 + 얼굴, toggle, 기본 숨김) -->
    <aside class="side-pane">
      <div class="cam-wrap">
        <video id="cam" autoplay muted playsinline></video>
        <canvas id="cam-canvas" class="hidden"></canvas>
        <!-- 얼굴 박스 오버레이 -->
        <canvas id="face-overlay" class="face-overlay"></canvas>
        <div class="cam-overlay">
          <span class="cam-label">VISUAL FEED · WHAT SARVIS SEES</span>
          <span id="cam-status" class="cam-status">OFF</span>
        </div>
        <!-- 모바일 전/후면 전환 버튼 -->
        <button id="cam-flip-btn" class="cam-flip-btn hidden" aria-label="카메라 전환">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/>
            <path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>

      <div class="cam-controls">
        <select id="cam-select" class="ghost"><option>Loading...</option></select>
        <button id="cam-toggle" class="ghost">START</button>
        <label class="toggle">
          <input id="observe-toggle" type="checkbox" disabled>
          <span>행동 인식</span>
        </label>
      </div>

      <div id="observation-card" class="observation hidden">
        <div class="obs-title">OBSERVATION</div>
        <div id="observation-text"></div>
      </div>

      <!-- 얼굴 등록 / 식별 -->
      <div class="face-panel">
        <div class="face-header">
          <span class="face-title">REGISTERED FACES</span>
          <span id="face-count" class="face-count">0</span>
        </div>
        <form id="face-form" class="face-form">
          <input id="face-name-input" type="text" placeholder="이름을 입력하고 등록"
                 maxlength="20" autocomplete="off">
          <button type="submit" class="ghost" title="현재 카메라 프레임으로 등록">+ 등록</button>
        </form>
        <div id="face-list" class="face-list"></div>
        <div id="face-msg" class="face-msg"></div>
      </div>
    </aside>
  </main>

  <!-- Mobile: 하단 통합 입력바 (마이크 + 텍스트 + 전송) -->
  <form id="mobile-text-form" class="mobile-input-bar">
    <button id="mobile-mic-btn" type="button" class="mobile-mic-btn" aria-label="음성 입력">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3z"/>
        <path d="M19 10a7 7 0 01-14 0"/>
        <line x1="12" y1="17" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <input id="mobile-text-input" type="text" placeholder="SARVIS에게 메시지..."
           autocomplete="off" autocorrect="off" spellcheck="false">
    <button type="submit" class="mobile-send-btn">↑</button>
  </form>

  <!-- Mobile: 하단 탭바 (대화 우선) -->
  <div class="mobile-tabs">
    <nav>
      <button class="tab-btn active" data-tab="chat">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        대화
      </button>
      <button class="tab-btn" data-tab="orb">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        오브
      </button>
      <button class="tab-btn" data-tab="side">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        비전
      </button>
    </nav>
  </div>
</section>

<audio id="tts-audio" preload="auto"></audio>

<script src="/static/orb.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
