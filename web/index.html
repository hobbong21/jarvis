<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#03070C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>S.A.R.V.I.S</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ======================== Main ======================== -->
<section id="main-screen" class="screen">
  <header class="topbar">
    <div class="brand-sm">S . A . R . V . I . S</div>
    <div id="state-pill" class="state-pill">STATE · IDLE</div>
    <div class="meta">
      <span id="clock"></span>
      <span class="dot">·</span>
      <span>BRAIN <strong id="backend-label">CLAUDE</strong></span>
    </div>
  </header>

  <main class="layout">
    <!-- 좌/탭1: 오브 + 컨트롤 -->
    <div class="orb-pane tab-active">
      <div class="orb-stack">
        <div class="orb-unit primary">
          <span class="orb-tag">CLAUDE</span>
          <canvas id="orb" width="640" height="640"></canvas>
          <span class="orb-sub-emotion" id="emotion-label-1">NEUTRAL</span>
        </div>
        <div class="orb-unit secondary" hidden>
          <span class="orb-tag">OPENAI</span>
          <canvas id="orb-2" width="640" height="640"></canvas>
          <span class="orb-sub-emotion" id="emotion-label-2">NEUTRAL</span>
        </div>
      </div>
      <div class="orb-label">
        <span id="emotion-label">NEUTRAL</span>
        <span id="hint-label" class="hint">버튼을 누르거나 SPACE 를 눌러 말하세요</span>
      </div>
      <div id="tool-badge" class="tool-badge hidden">⚙ <span id="tool-name"></span></div>

      <div class="controls">
        <button id="mic-btn" class="primary big" aria-label="음성 입력">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3z"/>
            <path d="M19 10a7 7 0 01-14 0"/>
            <line x1="12" y1="17" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
          <span id="mic-label">SPEAK</span>
        </button>
      </div>

      <form id="text-form" class="text-input">
        <input id="text-input" type="text" placeholder="텍스트로 입력..."
               autocomplete="off" autocorrect="off" spellcheck="false">
        <button type="submit" class="ghost">SEND</button>
      </form>

      <div class="quick-keys">
        <button data-key="claude" class="ghost">1·CLAUDE</button>
        <button data-key="openai" class="ghost">2·OPENAI</button>
        <button data-key="ollama" class="ghost">3·OLLAMA</button>
        <button data-key="compare" class="ghost">4·COMPARE</button>
        <button data-key="reset" class="ghost">R·RESET</button>
      </div>

      <!-- 모바일 전용: ORB 탭에서 사비스 응답 표시 -->
      <div id="orb-reply" class="orb-reply" role="status" aria-live="assertive" aria-label="사비스 응답"></div>
    </div>

    <!-- 우/탭2: 카메라 + 로그 -->
    <aside class="side-pane">
      <div class="cam-wrap">
        <video id="cam" autoplay muted playsinline></video>
        <canvas id="cam-canvas" class="hidden"></canvas>
        <!-- 얼굴 박스 오버레이 -->
        <canvas id="face-overlay" class="face-overlay"></canvas>
        <div class="cam-overlay">
          <span class="cam-label">VISUAL FEED · WHAT SARVIS SEES</span>
          <span id="cam-status" class="cam-status">OFF</span>
        </div>
        <!-- 모바일 전/후면 전환 버튼 -->
        <button id="cam-flip-btn" class="cam-flip-btn hidden" aria-label="카메라 전환">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/>
            <path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
      </div>

      <div class="cam-controls">
        <select id="cam-select" class="ghost"><option>Loading...</option></select>
        <button id="cam-toggle" class="ghost">START</button>
        <label class="toggle">
          <input id="observe-toggle" type="checkbox" disabled>
          <span>행동 인식</span>
        </label>
      </div>

      <div id="observation-card" class="observation hidden">
        <div class="obs-title">OBSERVATION</div>
        <div id="observation-text"></div>
      </div>

      <!-- 얼굴 등록 / 식별 -->
      <div class="face-panel">
        <div class="face-header">
          <span class="face-title">REGISTERED FACES</span>
          <span id="face-count" class="face-count">0</span>
        </div>
        <form id="face-form" class="face-form">
          <input id="face-name-input" type="text" placeholder="이름을 입력하고 등록"
                 maxlength="20" autocomplete="off">
          <button type="submit" class="ghost" title="현재 카메라 프레임으로 등록">+ 등록</button>
        </form>
        <div id="face-list" class="face-list"></div>
        <div id="face-msg" class="face-msg"></div>
      </div>

      <div class="log-pane">
        <div class="log-header">COMMUNICATION LOG</div>
        <div id="log" class="log-body" role="log" aria-live="polite"></div>
      </div>
    </aside>
  </main>

  <!-- Mobile: 하단 통합 입력바 (마이크 + 텍스트 + 전송) -->
  <form id="mobile-text-form" class="mobile-input-bar">
    <button id="mobile-mic-btn" type="button" class="mobile-mic-btn" aria-label="음성 입력">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a3 3 0 00-3 3v6a3 3 0 006 0V5a3 3 0 00-3-3z"/>
        <path d="M19 10a7 7 0 01-14 0"/>
        <line x1="12" y1="17" x2="12" y2="22"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <input id="mobile-text-input" type="text" placeholder="메시지 입력..."
           autocomplete="off" autocorrect="off" spellcheck="false">
    <button type="submit" class="mobile-send-btn">↑</button>
  </form>

  <!-- Mobile: 하단 탭바 -->
  <div class="mobile-tabs">
    <nav>
      <button class="tab-btn active" data-tab="orb">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        ORB
      </button>
      <button class="tab-btn" data-tab="side">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        LOG
      </button>
    </nav>
  </div>
</section>

<audio id="tts-audio" preload="auto"></audio>

<script src="/static/orb.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
