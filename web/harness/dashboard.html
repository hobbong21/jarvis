<!DOCTYPE html>

  }
  .card {
    max-width: 480px;

  h1 { color: #00d9ff; margin: 0 0 16px; font-size: 22px; }

    display: inline-block; margin-top: 18px;

<div class="card">
  <h1>제어판으로 이동되었습니다</h1>
  <p>사이클 #31 부터 Harness 텔레메트리는 메인 SARVIS 화면의 <strong>제어판</strong> 사이드 패널 안으로 통합되었습니다.</p>
  <p>주인 인증 (얼굴 + 음성) 통과 후 우상단 <strong>제어판</strong> 버튼 → <strong>Harness</strong> 탭에서 같은 메트릭과 evolve 기능을 사용할 수 있습니다.</p>
  <p>별도의 토큰 입력은 더 이상 필요하지 않습니다 (storage_token 으로 자동 인증).</p>
  <a href="/">메인 화면으로 이동</a>
